name: Minerador -> Hugging Face (high-performance)

on:
  workflow_dispatch:

jobs:
  mineracao:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnose disk and environment
        run: |
          echo "=== df -h ==="
          df -h
          echo "=== lsblk ==="
          lsblk
          echo "=== mount ==="
          mount | sed -n '1,200p' || true

      - name: Configure SAVE_PATH
        run: |
          if [ -d /mnt ]; then
            sudo mkdir -p /mnt/downloads || true
            sudo chmod 777 /mnt/downloads || true
            echo "SAVE_PATH=/mnt/downloads" >> $GITHUB_ENV
          else
            mkdir -p $GITHUB_WORKSPACE/data
            echo "SAVE_PATH=$GITHUB_WORKSPACE/data" >> $GITHUB_ENV
          fi
          echo "Using SAVE_PATH=$SAVE_PATH"

      - name: Safe cleanup to recover space
        run: |
          sudo rm -rf /var/lib/apt/lists/* || true
          rm -rf $HOME/.cache || true
          rm -rf /tmp/* || true
          df -h

      - name: Setup Python and system deps
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install system packages (libtorrent + build deps)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev \
            libtorrent-rasterbar-dev libcurl4-openssl-dev pkg-config
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            duckdb \
            pyarrow \
            pandas \
            requests \
            huggingface_hub \
            rich \
            python-libtorrent \
            colorlog

      - name: Run minerador
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET: Trader_Emails
          SAVE_PATH: ${{ env.SAVE_PATH }}
          MAX_SIMULTANEOUS_TORRENTS: "5"
          WORKERS: ${{ matrix.workers || 4 }}
        run: |
          mkdir -p "$SAVE_PATH"
          python minerador.py

      - name: Post-run diagnostics
        if: always()
        run: |
          echo "=== df -h ==="
          df -h
          echo "=== Save path usage ==="
          du -sh "$SAVE_PATH" || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: minerador-diagnostics
          path: |
            ${{ env.SAVE_PATH }}/checkpoints/checkpoint.json
            ${{ env.SAVE_PATH }}/chunks
            ${{ env.SAVE_PATH }}/final_parts
            ${{ env.SAVE_PATH }}/minerador.log
