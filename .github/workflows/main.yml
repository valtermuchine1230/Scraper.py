- name: Install system dependencies
        run: |
          sudo apt-get update
          # Este pacote instala a biblioteca C++ e os bindings Python automaticamente
          sudo apt-get install -y libtorrent-rasterbar-dev python3-libtorrent
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Remova o python-libtorrent daqui!
          pip install psycopg[binary]
