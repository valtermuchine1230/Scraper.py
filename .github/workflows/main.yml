name: Minerador -> Hugging Face

on:
  workflow_dispatch:

jobs:
  mineracao:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnose disk and environment
        run: |
          echo "=== df -h ==="
          df -h
          echo "=== lsblk ==="
          lsblk
          echo "=== mount ==="
          mount | sed -n '1,200p' || true

      - name: Configure SAVE_PATH
        run: |
          if [ -d /mnt ]; then
            sudo mkdir -p /mnt/downloads
            sudo chmod 777 /mnt/downloads
            echo "SAVE_PATH=/mnt/downloads" >> $GITHUB_ENV
          else
            mkdir -p $GITHUB_WORKSPACE/data
            echo "SAVE_PATH=$GITHUB_WORKSPACE/data" >> $GITHUB_ENV
          fi

      - name: Safe cleanup to recover space
        run: |
          sudo rm -rf /var/lib/apt/lists/* || true
          rm -rf $HOME/.cache || true
          rm -rf /tmp/* || true
          df -h

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libssl-dev \
            libffi-dev \
            libcurl4-openssl-dev \
            pkg-config \
            python3-libtorrent

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pandas \
            pyarrow \
            duckdb \
            requests \
            huggingface_hub \
            rich \
            psutil \
            colorlog

      - name: Verify libtorrent
        run: |
          python --version
          python -c "import libtorrent as lt; print('libtorrent version:', lt.version)"

      - name: Run minerador
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_NAME: Trader_Emails
          SAVE_PATH: ${{ env.SAVE_PATH }}
          POLL_INTERVAL: "60"
          WORKERS: "4"
          PART_ROWS: "30000000"
        run: |
          mkdir -p "$SAVE_PATH"
          echo "SAVE_PATH=$SAVE_PATH"
          df -h
          python minerador.py
          df -h

      - name: Post-run diagnostics
        if: always()
        run: |
          echo "=== df -h ==="
          df -h
          echo "=== Save path usage ==="
          du -sh "$SAVE_PATH" || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: minerador-diagnostics
          path: |
            ${{ env.SAVE_PATH }}/checkpoints
            ${{ env.SAVE_PATH }}/minerador.log
            ${{ env.SAVE_PATH }}/chunks
            ${{ env.SAVE_PATH }}/final_parts
            ${{ env.SAVE_PATH }}/exports
