name: Minerador -> Hugging Face
on:
  workflow_dispatch:

jobs:
  mineracao:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System packages (libtorrent)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev \
            libtorrent-rasterbar-dev libcurl4-openssl-dev
        # Note: python binding availability depends on runner. If the runner lacks python-libtorrent package,
        # you may need a self-hosted runner or to compile bindings. This installs system deps.

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub datasets pyarrow pandas rich libtorrent colorlog

      - name: Run minerador
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SAVE_PATH: ${{ github.workspace }}/data
        run: |
          mkdir -p $SAVE_PATH
          python minerador.py
