name: Minerador Production - High Performance Pipeline

on:
  push:
    branches:
      - main

  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

  workflow_dispatch:
    inputs:
      resume:
        description: 'Resume from checkpoint'
        required: false
        default: 'true'

# 🔴 FIX CRÍTICO: evita cancelamento por execuções sobrepostas
concurrency:
  group: minerador-production
  cancel-in-progress: false

env:
  SAVE_PATH: ${{ github.workspace }}/data
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  HF_REPO_EMAILS: Trader_Emails
  HF_REPO_CHECKPOINT: minerador_checkpoints
  LOG_LEVEL: INFO
  POLL_INTERVAL: 3
  CHUNK_SIZE: 1073741824
  BATCH_INSERT_DDB: 500000
  ROWS_PER_FINAL_FILE: 30000000
  MIN_FREE_BYTES: 536870912

jobs:
  minerador:
    runs-on: ubuntu-latest

    timeout-minutes: 360

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Increase swap space
        run: |
          sudo swapoff -a
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Clean up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libtorrent-rasterbar-dev \
            libssl-dev \
            libboost-all-dev \
            pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            libtorrent \
            huggingface-hub \
            pandas \
            pyarrow \
            duckdb \
            rich \
            psutil

      - name: Create data directories
        run: |
          mkdir -p "$SAVE_PATH"/{exports,temp,raw_chunks}
          ls -la "$SAVE_PATH"

      - name: Download checkpoint from HF
        run: |
          python << 'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN")
          repo_owner = os.environ.get("GITHUB_REPOSITORY_OWNER")

          if token and repo_owner:
              api = HfApi()
              try:
                  api.hf_hub_download(
                      repo_id=f"{repo_owner}/minerador_checkpoints",
                      filename="state.json",
                      local_dir=os.environ.get("SAVE_PATH"),
                      token=token,
                      repo_type="dataset"
                  )
                  print("✅ Checkpoint downloaded")
              except Exception as e:
                  print("⚠️ No checkpoint found or failed:", str(e))
          EOF

      - name: Run Minerador Production
        run: |
          python minerador_production.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Display logs (last 200 lines)
        if: always()
        run: |
          if [ -f "$SAVE_PATH/minerador.log" ]; then
            echo "=== MINERADOR LOG ==="
            tail -200 "$SAVE_PATH/minerador.log"
          fi

      - name: Show disk usage
        if: always()
        run: |
          echo "=== DISK USAGE ==="
          df -h
          echo ""
          echo "=== DATA DIRECTORY ==="
          du -sh "$SAVE_PATH"/* 2>/dev/null || true

      - name: Clean temporary files
        if: always()
        run: |
          rm -rf "$SAVE_PATH"/temp
          rm -rf "$SAVE_PATH"/raw_chunks/*.parquet
          du -sh "$SAVE_PATH"

      - name: Status summary
        if: always()
        run: |
          echo "✅ Workflow completed"
          echo "📁 Data: $SAVE_PATH"
          if [ -f "$SAVE_PATH/state.json" ]; then
            echo "✅ State persisted for next run"
          fi
