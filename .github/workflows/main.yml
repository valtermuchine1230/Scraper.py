name: Minerador -> Hugging Face🗿📧🙂

on:
  workflow_dispatch:

jobs:
  mineracao:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnóstico do disco
        run: |
          echo "===== DF ====="
          df -h

          echo "===== LSBLK ====="
          lsblk

          echo "===== MOUNT ====="
          mount

          echo "===== /mnt ====="
          ls -lah /mnt || true

          echo "===== Espaço em /mnt ====="
          df -h /mnt || true

      - name: Criar diretórios e definir SAVE_PATH
        run: |
          if [ -d /mnt ]; then
            echo "📦 /mnt encontrado"

            sudo mkdir -p /mnt/downloads
            sudo chmod 777 /mnt/downloads

            echo "SAVE_PATH=/mnt/downloads" >> $GITHUB_ENV
          else
            echo "📦 Usando workspace"

            mkdir -p "$GITHUB_WORKSPACE/data"

            echo "SAVE_PATH=$GITHUB_WORKSPACE/data" >> $GITHUB_ENV
          fi

      - name: Limpeza segura para recuperar espaço
        run: |
          echo "🧹 Antes da limpeza"
          df -h

          sudo rm -rf /var/lib/apt/lists/* || true
          rm -rf $HOME/.cache || true
          rm -rf /tmp/* || true

          echo "🧹 Depois da limpeza"
          df -h

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -y

          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            libtorrent-rasterbar-dev \
            libcurl4-openssl-dev \
            pkg-config

          python -m pip install --upgrade pip

      - name: Instalar dependências Python
        run: |
          pip install \
            huggingface_hub \
            datasets \
            pyarrow \
            pandas \
            rich \
            libtorrent \
            colorlog

      - name: Verificar espaço antes do minerador
        run: |
          echo "===== DF ====="
          df -h

          echo "===== SAVE_PATH ====="
          echo $SAVE_PATH

          du -sh "$SAVE_PATH" || true

      - name: Executar minerador
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_NAME: email_miner_dataset
          POLL_INTERVAL: "60"
          BATCH_INSERT: "5000"
          BATCH_EXPORT_ROWS: "200000"

        run: |
          mkdir -p "$SAVE_PATH"
          python minerador.py

      - name: Diagnóstico final
        if: always()
        run: |
          echo "===== DF FINAL ====="
          df -h

          echo "===== Uso do SAVE_PATH ====="
          du -sh "$SAVE_PATH" || true

          echo "===== /tmp ====="
          du -sh /tmp || true

      - name: Upload de diagnósticos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: minerador-diagnostics
          path: |
            ${{ github.workspace }}/data/checkpoint.json
            ${{ github.workspace }}/data/exports
            ${{ github.workspace }}/data/emails.db
