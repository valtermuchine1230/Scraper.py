name: Minerador -> Hugging Face

on:
  workflow_dispatch:

jobs:
  mineracao:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SAVE_PATH
        run: |
          sudo mkdir -p /mnt/downloads
          sudo chmod 777 /mnt/downloads
          echo "SAVE_PATH=/mnt/downloads" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          rm -rf $HOME/.cache || true
          rm -rf /tmp/* || true
          df -h

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python3-pip \
            python3-dev \
            python3-libtorrent \
            build-essential \
            libssl-dev \
            libffi-dev \
            libcurl4-openssl-dev \
            pkg-config

      - name: Upgrade pip
        run: |
          python3 -m pip install --upgrade pip

      - name: Install Python packages
        run: |
          python3 -m pip install \
            pandas \
            pyarrow \
            duckdb \
            requests \
            huggingface_hub \
            rich \
            psutil \
            colorlog

      - name: Verify libtorrent
        run: |
          python3 --version
          python3 -c "import libtorrent as lt; print('libtorrent version:', lt.version)"

      - name: Run minerador
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_NAME: Trader_Emails
          SAVE_PATH: ${{ env.SAVE_PATH }}
          POLL_INTERVAL: "60"
          WORKERS: "4"
          PART_ROWS: "30000000"
        run: |
          mkdir -p "$SAVE_PATH"
          df -h
          python3 minerador.py

      - name: Diagnostics
        if: always()
        run: |
          df -h
          du -sh "$SAVE_PATH" || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: minerador-diagnostics
          path: |
            /mnt/downloads/checkpoints
            /mnt/downloads/minerador.log
            /mnt/downloads/chunks
            /mnt/downloads/final_parts
            /mnt/downloads/exports
