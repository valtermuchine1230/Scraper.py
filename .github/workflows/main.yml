name: Minerador

on:
  workflow_dispatch:

jobs:
  mineracao:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Liberar espaço
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          docker system prune -af || true
          df -h

      - name: Definir SAVE_PATH
        run: |
          sudo mkdir -p /mnt/downloads
          sudo chmod 777 /mnt/downloads
          echo "SAVE_PATH=/mnt/downloads" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-libtorrent \
            libtorrent-rasterbar2.0 \
            build-essential

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow huggingface_hub rich psutil

      - name: Verificar Python
        run: |
          python --version

      - name: Verificar libtorrent
        run: |
          python -c "import libtorrent"

      - name: Executar minerador
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_NAME: Trader_Emails
          SAVE_PATH: ${{ env.SAVE_PATH }}
          POLL_INTERVAL: "60"
        run: |
          mkdir -p "$SAVE_PATH"
          df -h
          python minerador.py

      - name: Upload logs em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            /mnt/downloads/checkpoints
            /mnt/downloads/minerador.log
