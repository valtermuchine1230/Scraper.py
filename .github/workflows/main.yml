name: Minerador -> Trader_Emails

on:
  workflow_dispatch:

jobs:
  mineracao:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnose disk and set SAVE_PATH
        run: |
          echo "=== df -h BEFORE CLEANUP ==="
          df -h

          if [ -d /mnt ]; then
            sudo mkdir -p /mnt/downloads || true
            sudo chmod 777 /mnt/downloads || true
            echo "SAVE_PATH=/mnt/downloads" >> $GITHUB_ENV
          else
            mkdir -p $GITHUB_WORKSPACE/data
            echo "SAVE_PATH=$GITHUB_WORKSPACE/data" >> $GITHUB_ENV
          fi

          df -h

      - name: Safe cleanup to free disk (non-destructive)
        run: |
          echo "🧹 Cleaning caches"
          sudo rm -rf /var/lib/apt/lists/* || true
          rm -rf $HOME/.cache || true
          rm -rf $HOME/.npm || true
          rm -rf /tmp/* || true

          echo "Disk after cleanup:"
          df -h

      - name: Optionally remove hosted toolcache
        if: env.FORCE_CLEAN_HOSTEDTOOLCACHE == 'true'
        run: |
          echo "⚠️ Removing /opt/hostedtoolcache"
          sudo rm -rf /opt/hostedtoolcache || true
          df -h

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update -y

          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libssl-dev \
            libffi-dev \
            libcurl4-openssl-dev \
            pkg-config \
            libtorrent-rasterbar-dev \
            python3-libtorrent

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            duckdb \
            pyarrow \
            pandas \
            requests \
            huggingface_hub \
            rich \
            psutil

      - name: Run minerador
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET: Trader_Emails
          SAVE_PATH: ${{ env.SAVE_PATH }}
          POLL_INTERVAL: "60"
          PROGRESS_LOG_INTERVAL: "60"
          PROGRESS_LOG_PERCENT_DELTA: "1.0"
          WORKERS: "4"
          PART_ROWS: "30000000"
          MIN_FREE_BYTES: ${{ secrets.MIN_FREE_BYTES || '268435456' }}
          FORCE_CLEAN_HOSTEDTOOLCACHE: ${{ env.FORCE_CLEAN_HOSTEDTOOLCACHE }}
        run: |
          mkdir -p "$SAVE_PATH"

          echo "df before run"
          df -h

          python minerador.py

          echo "df after run"
          df -h

      - name: Post-run diagnostics
        if: always()
        run: |
          echo "=== df -h AFTER ==="
          df -h

          echo "=== SAVE_PATH usage ==="
          du -sh "$SAVE_PATH" || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: minerador-diagnostics
          path: |
            ${{ env.SAVE_PATH }}/checkpoints/checkpoint.json
            ${{ env.SAVE_PATH }}/chunks
            ${{ env.SAVE_PATH }}/final_parts
            ${{ env.SAVE_PATH }}/minerador.log
