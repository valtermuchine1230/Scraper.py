name: Minerador-Neon-Producao
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  mineracao:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar Dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-libtorrent
          pip install libtorrent psycopg[binary]
      - name: Rodar Minerador
        run: python minerador.py
