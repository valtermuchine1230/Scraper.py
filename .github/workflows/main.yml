name: Minerador-Neon-Escalavel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  mineracao:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar Dependências
        run: pip install libtorrent psycopg[binary] requests
      - name: Rodar Minerador
        run: python minerador.py
