name: Minerador -> Trader_Emails

on:
  workflow_dispatch:

jobs:
  minerador:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir SAVE_PATH
        run: |
          sudo mkdir -p /mnt/downloads
          sudo chmod 777 /mnt/downloads
          echo "SAVE_PATH=/mnt/downloads" >> $GITHUB_ENV

      - name: Limpeza do runner
        run: |
          rm -rf $HOME/.cache || true
          rm -rf /tmp/* || true
          df -h

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-libtorrent \
            libtorrent-rasterbar-dev

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip

          pip install \
            huggingface_hub \
            pandas \
            pyarrow \
            rich

      - name: Verificar libtorrent
        run: |
          python --version
          python -c "import libtorrent as lt; print('libtorrent OK')"

      - name: Criar diretórios
        run: |
          mkdir -p "$SAVE_PATH"
          df -h

      - name: Executar minerador
        env:
          SAVE_PATH: ${{ env.SAVE_PATH }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_NAME: Trader_Emails
          POLL_INTERVAL: "60"
          LOG_LEVEL: "INFO"
          BATCH_INSERT: "5000"
          BATCH_EXPORT_ROWS: "200000"
          MIN_FREE_BYTES: "268435456"
        run: |
          python minerador.py

      - name: Mostrar espaço em disco
        if: always()
        run: |
          df -h
          du -sh /mnt/downloads || true

      - name: Upload de logs em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: minerador-logs
          path: |
            /mnt/downloads/minerador.log
            /mnt/downloads/checkpoints
            /mnt/downloads/exports
